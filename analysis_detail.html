<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WriteVideo.ai 分析結果</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f2ec; color: #0f0e0d; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
.meta { background: white; border: 1px solid #e5e0d8; padding: 20px; margin-bottom: 20px; }
.meta-ch { font-size: 10px; font-family: monospace; color: #c8460a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.meta-prompt { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.meta-date { font-size: 11px; color: #aaa; font-family: monospace; }
.result-box { background: white; border: 1px solid #e5e0d8; padding: 28px; }
.result-label { font-size: 10px; font-family: monospace; color: #c8460a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
.result-text { font-size: 14px; line-height: 1.9; }

/* マークダウンスタイル */
.result-text h1 { font-size: 20px; font-weight: 700; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e0d8; }
.result-text h2 { font-size: 17px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #e5e0d8; }
.result-text h3 { font-size: 15px; font-weight: 700; margin: 16px 0 8px; color: #c8460a; }
.result-text h4 { font-size: 14px; font-weight: 700; margin: 12px 0 6px; }
.result-text p { margin-bottom: 12px; }
.result-text ul, .result-text ol { margin: 8px 0 12px 24px; }
.result-text li { margin-bottom: 6px; }
.result-text strong { font-weight: 700; }
.result-text em { font-style: italic; }
.result-text code { font-family: monospace; background: #f0ebe3; padding: 2px 6px; font-size: 12px; }
.result-text blockquote { border-left: 3px solid #c8460a; padding-left: 16px; color: #666; margin: 12px 0; }
.result-text hr { border: none; border-top: 1px solid #e5e0d8; margin: 20px 0; }
.result-text table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.result-text th { background: #f5f2ec; padding: 8px 12px; text-align: left; border: 1px solid #e5e0d8; font-weight: 700; }
.result-text td { padding: 8px 12px; border: 1px solid #e5e0d8; }
.result-text tr:nth-child(even) td { background: #faf8f5; }

.btn-row { margin-top: 20px; display: flex; gap: 10px; }
.copy-btn { padding: 8px 20px; background: #0f0e0d; color: white; border: none; font-size: 12px; cursor: pointer; font-family: monospace; }
.copy-btn:hover { background: #c8460a; }
.back-btn { padding: 8px 20px; background: #f5f2ec; color: #0f0e0d; border: 1px solid #e5e0d8; font-size: 12px; cursor: pointer; font-family: monospace; text-decoration: none; display: inline-flex; align-items: center; }
.back-btn:hover { border-color: #c8460a; color: #c8460a; }
.loading { text-align: center; padding: 48px; color: #888; font-size: 13px; font-family: monospace; }
</style>
</head>
<body>
<div style="font-size:10px;font-family:monospace;color:#bbb;margin-bottom:12px;">Released: 2026-04-18 10:05 JST</div>
<div style="position:fixed;top:20px;left:20px;z-index:9999;display:flex;gap:8px;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:#0f0e0d;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;">← ダッシュボード</a>
  <a href="analysis_list.html" style="display:inline-flex;align-items:center;gap:6px;background:#555;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;">一覧</a>
</div>
<script>fetch("/api/check-session").then(r=>r.json()).then(d=>{if(!d.auth){window.location.href="/index.html";}}).catch(()=>{window.location.href="/index.html";});</script>

<div class="container">
  <div id="content"><div class="loading">読み込み中...</div></div>
</div>

<script>
// マークダウンパーサー
function parseMarkdown(raw) {
  // エスケープ
  let text = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  
  const lines = text.split('\n');
  const result = [];
  let i = 0;
  
  while (i < lines.length) {
    const line = lines[i];
    
    // 見出し
    if (/^####\s/.test(line)) { result.push(`<h4>${line.replace(/^####\s+/,'')}</h4>`); i++; continue; }
    if (/^###\s/.test(line))  { result.push(`<h3>${line.replace(/^###\s+/,'')}</h3>`); i++; continue; }
    if (/^##\s/.test(line))   { result.push(`<h2>${line.replace(/^##\s+/,'')}</h2>`); i++; continue; }
    if (/^#\s/.test(line))    { result.push(`<h1>${line.replace(/^#\s+/,'')}</h1>`); i++; continue; }
    
    // 区切り線
    if (/^---+$/.test(line.trim())) { result.push('<hr>'); i++; continue; }
    
    // リスト
    if (/^[-*]\s/.test(line) || /^\d+\.\s/.test(line)) {
      const items = [];
      const isOrdered = /^\d+\.\s/.test(line);
      while (i < lines.length && (/^[-*]\s/.test(lines[i]) || /^\d+\.\s/.test(lines[i]))) {
        const itemText = lines[i].replace(/^[-*]\s+/, '').replace(/^\d+\.\s+/, '');
        items.push(`<li>${inlineFormat(itemText)}</li>`);
        i++;
      }
      const tag = isOrdered ? 'ol' : 'ul';
      result.push(`<${tag}>${items.join('')}</${tag}>`);
      continue;
    }
    
    // テーブル
    if (line.includes('|') && i+1 < lines.length && lines[i+1].includes('---')) {
      const headers = line.split('|').filter(c => c.trim()).map(c => `<th>${inlineFormat(c.trim())}</th>`);
      i += 2; // ヘッダーとセパレータをスキップ
      const rows = [];
      while (i < lines.length && lines[i].includes('|')) {
        const cells = lines[i].split('|').filter(c => c.trim()).map(c => `<td>${inlineFormat(c.trim())}</td>`);
        rows.push(`<tr>${cells.join('')}</tr>`);
        i++;
      }
      result.push(`<table style="width:100%;border-collapse:collapse;margin:12px 0;"><thead><tr>${headers.join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`);
      continue;
    }
    
    // 空行
    if (line.trim() === '') { result.push('<br>'); i++; continue; }
    
    // 通常テキスト
    result.push(`<p>${inlineFormat(line)}</p>`);
    i++;
  }
  
  return result.join('\n');
}

function inlineFormat(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}

async function load() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'analysis_list.html'; return; }
  try {
    const res = await fetch(`/api/get-analysis?id=${id}`);
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.title = `${data.prompt} — WriteVideo.ai`;
    const html = parseMarkdown(data.result || '');
    document.getElementById('content').innerHTML = `
      <div class="meta">
        <div class="meta-ch">#${data.channel}</div>
        <div class="meta-prompt">${data.prompt}</div>
        <div class="meta-date">${data.createdAt}</div>
      </div>
      <div class="result-box">
        <div class="result-label">AI分析結果</div>
        <div class="result-text" id="resultText">${html}</div>
        <div class="btn-row">
          <button class="copy-btn" onclick="copyText()">📋 コピー</button>
          <a href="analysis_list.html" class="back-btn">一覧に戻る</a>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading">読み込みエラー: ${e.message}</div>`;
  }
}

function copyText() {
  const text = document.getElementById('resultText').innerText;
  navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
}

load();
</script>
</body>
</html>
