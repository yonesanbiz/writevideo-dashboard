<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WriteVideo.ai 分析結果</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f2ec; color: #0f0e0d; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
.meta { background: white; border: 1px solid #e5e0d8; padding: 20px; margin-bottom: 20px; }
.meta-ch { font-size: 10px; font-family: monospace; color: #c8460a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.meta-prompt { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.meta-date { font-size: 11px; color: #aaa; font-family: monospace; }
.result-box { background: white; border: 1px solid #e5e0d8; padding: 28px; }
.result-label { font-size: 10px; font-family: monospace; color: #c8460a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
.result-text { font-size: 14px; line-height: 1.9; white-space: pre-wrap; }
.copy-btn { margin-top: 20px; padding: 8px 20px; background: #0f0e0d; color: white; border: none; font-size: 12px; cursor: pointer; font-family: monospace; }
.copy-btn:hover { background: #c8460a; }
.loading { text-align: center; padding: 48px; color: #888; font-size: 13px; font-family: monospace; }
</style>
</head>
<body>
<div style="font-size:10px;font-family:monospace;color:#bbb;margin-bottom:12px;">Released: 2026-04-16 10:53 JST</div>
<div style="position:fixed;top:20px;left:20px;z-index:9999;display:flex;gap:8px;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:#0f0e0d;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;">← ダッシュボード</a>
  <a href="analysis_list.html" style="display:inline-flex;align-items:center;gap:6px;background:#555;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;">一覧</a>
</div>
<script>fetch("/api/check-session").then(r=>r.json()).then(d=>{if(!d.auth){window.location.href="/index.html";}}).catch(()=>{window.location.href="/index.html";});</script>

<div class="container">
  <div id="content"><div class="loading">読み込み中...</div></div>
</div>

<script>
async function load() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'analysis_list.html'; return; }
  try {
    const res = await fetch(`/api/get-analysis?id=${id}`);
    const data = await res.json();
    document.title = `${data.prompt} — WriteVideo.ai`;
    document.getElementById('content').innerHTML = `
      <div class="meta">
        <div class="meta-ch">#${data.channel}</div>
        <div class="meta-prompt">${data.prompt}</div>
        <div class="meta-date">${data.createdAt}</div>
      </div>
      <div class="result-box">
        <div class="result-label">AI分析結果</div>
        <div class="result-text" id="resultText">${data.result.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <button class="copy-btn" onclick="copy()">📋 コピー</button>
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">読み込みエラー</div>';
  }
}

function copy() {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
}

load();
</script>
</body>
</html>
