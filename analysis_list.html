<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WriteVideo.ai 分析結果一覧</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f2ec; color: #0f0e0d; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 32px; font-family: monospace; }
.card { background: white; border: 1px solid #e5e0d8; padding: 20px; margin-bottom: 12px; text-decoration: none; color: inherit; display: block; transition: border-color 0.15s; cursor: pointer; }
.card:hover { border-color: #c8460a; }
.card-ch { font-size: 10px; font-family: monospace; color: #c8460a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.card-prompt { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.card-date { font-size: 11px; color: #aaa; font-family: monospace; }
.empty { text-align: center; padding: 48px; color: #aaa; font-size: 13px; font-family: monospace; }
.loading { text-align: center; padding: 48px; color: #888; font-size: 13px; font-family: monospace; }
</style>
</head>
<body>
<div style="font-size:10px;font-family:monospace;color:#bbb;margin-bottom:12px;">Released: 2026-04-24 10:29 JST</div>
<div style="position:fixed;top:20px;left:20px;z-index:9999;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:#0f0e0d;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;">← ダッシュボードに戻る</a>
</div>
<script>document.documentElement.style.visibility="hidden";fetch("/api/check-session").then(r=>r.json()).then(d=>{if(!d.auth){window.location.href="/index.html";}else{document.documentElement.style.visibility="";}}).catch(()=>{window.location.href="/index.html";});</script>

<div class="container">
  <h1>AI分析結果一覧</h1>
  <p class="sub">保存された分析レポート</p>
  <div id="listArea"><div class="loading">読み込み中...</div></div>
</div>

<script>
async function loadList() {
  try {
    const res = await fetch('/api/get-analysis');
    const data = await res.json();
    const list = data.index || [];
    if (list.length === 0) {
      document.getElementById('listArea').innerHTML = '<div class="empty">まだ分析結果がありません</div>';
      return;
    }
    document.getElementById('listArea').innerHTML = list.map(item => `
      <div class="card" onclick="location.href='analysis_detail.html?id=${item.id}'">
        <div class="card-ch">#${item.channel}</div>
        <div class="card-prompt">${item.prompt}</div>
        <div class="card-date">${item.createdAt}</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('listArea').innerHTML = '<div class="empty">読み込みエラー</div>';
  }
}
loadList();
</script>
</body>
</html>
