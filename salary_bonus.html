<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボーナス推移</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f2ec;padding:24px;color:#0f0e0d}
.back{position:fixed;top:20px;left:20px;z-index:9999}
.back a{display:inline-flex;align-items:center;gap:6px;background:#0f0e0d;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px}
h1{font-size:20px;font-weight:700;margin-bottom:4px;padding-left:180px}
.sub{font-size:11px;color:#888;font-family:monospace;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:20px}
.card{background:white;border:1px solid #e5e0d8;border-radius:8px;padding:12px}
.cl{font-size:11px;color:#888;margin-bottom:3px}
.cv{font-size:20px;font-weight:500}
.cs{font-size:10px;color:#aaa;margin-top:2px}
.section{background:white;border:1px solid #e5e0d8;border-radius:8px;padding:16px;margin-bottom:16px}
.stitle{font-size:13px;font-weight:500;color:#444;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;font-family:monospace;background:#fff3e0;color:#e65100;padding:2px 6px;border-radius:3px}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:11px;color:#666}
.leg span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.note{font-size:10px;color:#aaa;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th{text-align:left;font-family:monospace;font-size:10px;color:#888;padding:6px 8px;border-bottom:1px solid #e5e0d8;background:#f9f7f3}
td{padding:8px;border-bottom:1px solid #f0ede8}
tr:last-child td{border-bottom:none}
.amount{font-weight:500;text-align:right}
</style>
<script>fetch("/api/check-session").then(r=>r.json()).then(d=>{if(!d.auth){window.location.href="/index.html";}}).catch(()=>{window.location.href="/index.html";});</script></head>
<body>
<div style="position:fixed;bottom:12px;right:16px;font-size:10px;font-family:monospace;color:#aaa;z-index:9998;pointer-events:none;background:rgba(245,242,236,0.85);padding:2px 6px;border-radius:3px;">Released: 2026-04-15 23:18 JST</div>
<div class="back"><a href="index.html">← ダッシュボードに戻る</a></div>

<h1>ボーナス推移</h1>
<div class="sub">実績：21/02〜26/04　予測：26/05〜26/12</div>

<div class="grid">
  <div class="card"><div class="cl">最大ボーナス</div><div class="cv">285万</div><div class="cs">米倉 24/01</div></div>
  <div class="card"><div class="cl">累計ボーナス（26/04）</div><div class="cv">2,193万</div><div class="cs">全員合計</div></div>
  <div class="card"><div class="cl">年間ボーナス（25年）</div><div class="cv">503万</div><div class="cs">全員合計</div></div>
  <div class="card"><div class="cl">ボーナス支給回数</div><div class="cv">16回</div><div class="cs">実績ベース</div></div>
</div>

<div class="section">
  <div class="stitle">ボーナス推移（スタック）<span class="badge">26/05〜 予測</span></div>
  <div class="leg">
    <span><span class="dot" style="background:#378ADD"></span>米倉</span>
    <span><span class="dot" style="background:#1D9E75"></span>及川</span>
    <span><span class="dot" style="background:#7F77DD"></span>アウン</span>
    <span><span class="dot" style="background:#BA7517"></span>アーロン</span>
    <span><span class="dot" style="background:#D85A30"></span>南部</span>
    <span><span class="dot" style="background:#D4537E"></span>日浅</span>
    <span><span class="dot" style="background:#639922"></span>龍河</span>
  </div>
  <div style="position:relative;width:100%;height:300px"><canvas id="c_bonus"></canvas></div>
  <div class="note">濃色＝実績、薄色＝予測</div>
</div>

<div class="section">
  <div class="stitle">ボーナス一覧</div>
  <table>
    <thead><tr><th>月</th><th>氏名</th><th class="amount">金額（万円）</th><th>区分</th></tr></thead>
    <tbody id="bonusTable"></tbody>
  </table>
</div>

<script>
// データをAPIから取得
let L,CUTOFF,OUTSOURCE_START,OVERSEAS_START,OVERSEAS_DATA,SALES,DEV,C,BONUS_SPLIT,R;
(async () => {
  const res = await fetch('/api/salary-data');
  if (!res.ok) { window.location.href='/index.html'; return; }
  const d = await res.json();
  L=d.L;CUTOFF=d.CUTOFF;C=d.C;BONUS_SPLIT=d.BONUS_SPLIT;R=d.R;
  initBonus();
})();

function initBonus() {
// ボーナスデータ分離（実績/予測）
const bonusActual={}, bonusForecast={};
Object.entries(R).forEach(([n,a])=>{
  const bd=getBonusData(n,a);
  bonusActual[n]=bd.map((v,i)=>v!==null&&i<=CUTOFF?v:null);
  bonusForecast[n]=bd.map((v,i)=>v!==null&&i>CUTOFF?v:null);
});

// グラフ
const datasets=Object.keys(C).flatMap(n=>[
  {label:n,data:bonusActual[n],backgroundColor:C[n]+'cc',borderColor:C[n],borderWidth:1,stack:'bonus'},
  {label:n+'_f',data:bonusForecast[n],backgroundColor:C[n]+'44',borderColor:C[n],borderWidth:1,borderDash:[4,3],stack:'bonus'}
]);

new Chart(document.getElementById('c_bonus'),{
  type:'bar',
  data:{labels:L,datasets},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{autoSkip:true,maxTicksLimit:22,maxRotation:45,font:{size:10}}},
    y:{min:0,title:{display:true,text:'万円',font:{size:10}},ticks:{font:{size:10}}}}}
});

// ボーナス一覧テーブル
const tbody=document.getElementById('bonusTable');
const rows=[];
Object.entries(R).forEach(([n,a])=>{
  const bd=getBonusData(n,a);
  bd.forEach((v,i)=>{
    if(v!==null&&v>0) rows.push({month:L[i],name:n,amount:v,idx:i});
  });
});
rows.sort((a,b)=>a.idx-b.idx);
rows.forEach(r=>{
  const tr=document.createElement('tr');
  const isF=r.idx>CUTOFF;
  tr.innerHTML=`<td>${r.month}</td><td>${r.name}</td><td class="amount">${r.amount}</td><td style="font-size:10px;color:${isF?'#e65100':'#888'}">${isF?'予測':'実績'}</td>`;
  tbody.appendChild(tr);
});
} // end initBonus
</script>
</body>
</html>
