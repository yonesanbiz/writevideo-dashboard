<!DOCTYPE html>
<html lang="ja">
<head>

<title>営業チーム構成</title>
<script>document.documentElement.style.visibility="hidden";fetch("/api/check-session").then(r=>r.json()).then(d=>{if(!d.auth){window.location.href="/index.html";}else{document.documentElement.style.visibility="";}}).catch(()=>{window.location.href="/index.html";});</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f2ec;color:#0f0e0d;min-height:100vh;padding:40px 32px;}
.back{display:inline-flex;align-items:center;gap:6px;background:#0f0e0d;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;margin-bottom:32px;}
.back:hover{background:#333;}
h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;font-family:monospace;color:#999;margin-bottom:32px;}

/* テーブル */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:white;border:1px solid #e0dbd0;}
thead th{padding:12px 16px;font-size:11px;font-family:monospace;letter-spacing:0.08em;text-transform:uppercase;background:#f0ede6;border:1px solid #e0dbd0;text-align:left;font-weight:600;color:#555;white-space:nowrap;}
thead th:first-child{background:#d8ede0;color:#2a6b45;}
tbody td{padding:14px 16px;border:1px solid #e8e4dc;font-size:14px;vertical-align:middle;}
tbody tr:hover td{background:#faf8f4;}

/* 名前列 */
td.name{font-weight:700;font-size:15px;white-space:nowrap;}
td.type{font-size:12px;color:#555;font-family:monospace;max-width:200px;}

/* バッジ */
.badge{display:inline-block;padding:4px 12px;font-size:12px;font-weight:600;border-radius:2px;white-space:nowrap;}
.badge-main{background:#e07b00;color:#fff;}
.badge-sub{background:#f0b84a;color:#fff;}
.badge-sometimes{background:#f5d9a0;color:#7a5500;}
.badge-none{color:#ddd;}

/* 職種タグ */
.role-tag{display:inline-block;padding:3px 10px;font-size:11px;font-family:monospace;background:#f0ede6;border:1px solid #e0dbd0;color:#666;border-radius:2px;}
</style>
</head>
