<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WriteVideo.ai Slackチャンネル閲覧</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f2ec; color: #0f0e0d; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 32px; font-family: monospace; }

.controls { background: white; border: 1px solid #e5e0d8; padding: 20px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.control-group { display: flex; flex-direction: column; gap: 6px; }
.control-label { font-size: 11px; font-family: monospace; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
.control-select { padding: 10px 12px; border: 1px solid #e5e0d8; font-size: 14px; outline: none; background: white; min-width: 220px; }
.control-select:focus { border-color: #c8460a; }
.search-input { padding: 10px 12px; border: 1px solid #e5e0d8; font-size: 14px; outline: none; width: 200px; }
.search-input:focus { border-color: #c8460a; }
.fetch-btn { padding: 10px 24px; background: #0f0e0d; color: white; border: none; font-size: 13px; cursor: pointer; font-family: monospace; letter-spacing: 0.05em; height: 42px; }
.fetch-btn:hover { background: #c8460a; }
.fetch-btn:disabled { background: #ccc; cursor: not-allowed; }

/* AI チャットエリア */
.ai-box { background: #1a1a1a; border-radius: 12px; margin-bottom: 20px; display: none; overflow: hidden; }
.ai-box.visible { display: flex; flex-direction: column; height: 520px; }
.ai-box-title { font-size: 11px; font-family: monospace; color: #666; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 16px 10px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 8px; }
.ai-box-title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; display: inline-block; }

/* チャット履歴 */
.chat-history { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
.chat-history::-webkit-scrollbar { width: 4px; }
.chat-history::-webkit-scrollbar-track { background: transparent; }
.chat-history::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.chat-msg { display: flex; flex-direction: column; gap: 4px; }
.chat-msg.user { align-items: flex-end; }
.chat-msg.ai { align-items: flex-start; }
.chat-label { font-size: 10px; font-family: monospace; color: #555; padding: 0 4px; }
.chat-bubble { max-width: 82%; padding: 10px 14px; font-size: 13px; line-height: 1.75; border-radius: 12px; }
.chat-msg.user .chat-bubble { background: #c8460a; color: #fff; border-radius: 12px 12px 2px 12px; }
.chat-msg.ai .chat-bubble { background: #252525; color: #e8e3db; border-radius: 12px 12px 12px 2px; border: 1px solid #2e2e2e; }
.chat-msg.ai .chat-bubble h1,.chat-msg.ai .chat-bubble h2,.chat-msg.ai .chat-bubble h3 { color: #e8e3db; margin: 12px 0 6px; font-size: 14px; font-weight: 700; }
.chat-msg.ai .chat-bubble p { margin-bottom: 8px; }
.chat-msg.ai .chat-bubble ul,.chat-msg.ai .chat-bubble ol { margin: 4px 0 8px 16px; }
.chat-msg.ai .chat-bubble li { margin-bottom: 3px; }
.chat-msg.ai .chat-bubble code { background: #1a1a1a; padding: 2px 6px; border-radius: 3px; font-family: monospace; font-size: 12px; color: #1D9E75; }
.chat-msg.ai .chat-bubble strong { color: #fff; }
.thinking-box { font-size: 11px; font-family: monospace; color: #555; background: #111; border-left: 2px solid #333; padding: 8px 12px; margin-bottom: 8px; max-height: 120px; overflow-y: auto; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.thinking-box.active { border-left-color: #1D9E75; color: #444; }
.thinking-label { font-size: 10px; color: #444; font-family: monospace; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.streaming-cursor { display: inline-block; width: 2px; height: 14px; background: #c8460a; animation: blink 0.8s infinite; vertical-align: text-bottom; margin-left: 2px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.chat-empty { color: #444; font-size: 12px; font-family: monospace; text-align: center; padding: 40px 20px; line-height: 2; }

/* プリセット */
.ai-presets { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px; border-top: 1px solid #2a2a2a; }
.ai-preset { font-size: 11px; font-family: monospace; padding: 4px 10px; border: 1px solid #333; background: transparent; cursor: pointer; color: #666; border-radius: 20px; transition: all 0.15s; }
.ai-preset:hover { border-color: #c8460a; color: #c8460a; }

/* 入力エリア */
.ai-prompt-row { display: flex; gap: 0; border-top: 1px solid #2a2a2a; }
.ai-prompt-input { flex: 1; padding: 14px 16px; background: transparent; border: none; font-size: 14px; outline: none; font-family: inherit; color: #e8e3db; }
.ai-prompt-input::placeholder { color: #444; }
.ai-analyze-btn { padding: 14px 20px; background: #c8460a; color: white; border: none; font-size: 13px; cursor: pointer; font-family: monospace; white-space: nowrap; transition: background 0.15s; }
.ai-analyze-btn:hover { background: #a33808; }
.ai-analyze-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

/* 保存エリア */
.save-area { padding: 8px 16px; border-top: 1px solid #2a2a2a; display: flex; align-items: center; gap: 12px; }

.recent-channels { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.recent-ch-btn { font-size: 11px; font-family: monospace; padding: 4px 12px; border: 1px solid #d8d3cb; background: white; cursor: pointer; color: #555; border-radius: 20px; transition: all 0.15s; white-space: nowrap; }
.recent-ch-btn:hover { border-color: #c8460a; color: #c8460a; background: #fff8f5; }
.ch-search { width: 100%; padding: 7px 10px; border: 1px solid #e5e0d8; font-size: 13px; outline: none; font-family: inherit; margin-bottom: 6px; }
.ch-search:focus { border-color: #c8460a; }
.stats { font-size: 12px; font-family: monospace; color: #888; margin-bottom: 12px; }
.stats span { color: #c8460a; font-weight: 700; }

.msg { background: white; border: 1px solid #e5e0d8; padding: 16px; margin-bottom: 8px; }
.msg-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.msg-user { font-size: 12px; font-family: monospace; color: #c8460a; font-weight: 700; }
.msg-date { font-size: 11px; color: #aaa; font-family: monospace; }
.msg-text { font-size: 14px; line-height: 1.7; color: #0f0e0d; white-space: pre-wrap; word-break: break-word; }
.msg.is-reply { margin-left: 28px; border-left: 3px solid #e5e0d8; background: #faf9f6; }
.msg.is-reply .msg-user { color: #888; }
.reply-label { font-size: 10px; font-family: monospace; color: #bbb; margin-right: 6px; }
.empty { text-align: center; padding: 48px; color: #aaa; font-size: 13px; font-family: monospace; }
.loading { text-align: center; padding: 48px; color: #888; font-size: 13px; font-family: monospace; }
.highlight { background: #fff3cd; }

/* マークダウンスタイル */
#aiResult h1 { font-size: 18px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #e5e0d8; }
#aiResult h2 { font-size: 16px; font-weight: 700; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #e5e0d8; }
#aiResult h3 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: #c8460a; }
#aiResult h4 { font-size: 13px; font-weight: 700; margin: 10px 0 4px; }
#aiResult p { margin-bottom: 10px; }
#aiResult ul, #aiResult ol { margin: 6px 0 10px 20px; }
#aiResult li { margin-bottom: 4px; }
#aiResult strong { font-weight: 700; }
#aiResult em { font-style: italic; }
#aiResult code { font-family: monospace; background: #f0ebe3; padding: 2px 5px; font-size: 12px; }
#aiResult hr { border: none; border-top: 1px solid #e5e0d8; margin: 16px 0; }
#aiResult table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
#aiResult th { background: #f5f2ec; padding: 6px 10px; text-align: left; border: 1px solid #e5e0d8; font-weight: 700; }
#aiResult td { padding: 6px 10px; border: 1px solid #e5e0d8; }
#aiResult tr:nth-child(even) td { background: #faf8f5; }
</style>
</head>

<div class="container">
  <h1>Slackチャンネル閲覧・分析</h1>
  <p class="sub">チャンネルを選択してメッセージを表示・AIで分析</p>

  <div id="recentArea" style="display:none;"></div>
  <div class="controls">
    <div class="control-group" style="position:relative;">
      <span class="control-label">チャンネル</span>
      <input type="text" class="ch-search" id="chSearch" placeholder="チャンネルを検索..." autocomplete="off">
      <select class="control-select" id="channelSelect" size="1">
        <option value="">読み込み中...</option>
      </select>
    </div>
    <div class="control-group">
      <span class="control-label">取得件数</span>
      <select class="control-select" id="limitSelect" style="min-width:120px;">
        <option value="30">30件</option>
        <option value="50" selected>50件</option>
        <option value="100">100件</option>
        <option value="200">200件</option>
        <option value="500">500件</option>
      </select>
    </div>
    <div class="control-group">
      <span class="control-label">テキスト絞り込み</span>
      <input type="text" class="search-input" id="filterInput" placeholder="キーワードで絞り込み">
    </div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchMessages()">表示 →</button>
  </div>

  <!-- AI分析エリア -->
  <div class="ai-box" id="aiBox">
    <div class="ai-box-title">🤖 AIで分析</div>
    <div class="chat-history" id="chatHistory">
      <div class="chat-empty">チャンネルのメッセージを取得後<br>ここで質問できます<br><span style="color:#333;font-size:10px;margin-top:8px;display:block;">↑ チャンネルを選んで「表示」を押してください</span></div>
    </div>
    <div class="ai-presets" id="aiPresets">
      <span class="ai-preset" onclick="setPreset('このチャンネルの会話から営業マニュアルを作成して')">営業マニュアル作成</span>
      <span class="ai-preset" onclick="setPreset('よく出てくる課題・問題点を整理して')">課題整理</span>
      <span class="ai-preset" onclick="setPreset('FAQを抽出して質問と回答の形式でまとめて')">FAQ抽出</span>
      <span class="ai-preset" onclick="setPreset('重要な意思決定や結論をまとめて')">意思決定まとめ</span>
      <span class="ai-preset" onclick="setPreset('このチャンネルの会話を要約して')">要約</span>
      <span class="ai-preset" onclick="setPreset('改善提案・アクションアイテムを抽出して')">アクション抽出</span>
    </div>
    <div class="ai-prompt-row">
      <input type="text" class="ai-prompt-input" id="aiPromptInput" placeholder="チャンネルについて質問してください...">
      <button class="ai-analyze-btn" id="analyzeBtn" onclick="analyze()">送信 →</button>
    </div>
    <div id="saveArea" class="save-area" style="display:none;">
      <button class="fetch-btn" onclick="saveResult()" id="saveBtn" style="background:#1D9E75;font-size:11px;padding:6px 12px;border:none;color:white;cursor:pointer;font-family:monospace;">💾 最後の回答を保存</button>
      <a id="listLink" href="analysis_list.html" style="font-size:12px;font-family:monospace;color:#888;margin-left:16px;text-decoration:underline;">一覧を見る →</a>
      <button onclick="clearChat()" style="background:none;border:none;font-size:11px;color:#aaa;cursor:pointer;margin-left:12px;">🗑 クリア</button>
    </div>
  </div>

  <div id="statsArea"></div>
  <div id="messagesArea"><div class="empty">チャンネルを選択して「表示」を押してください</div></div>
</div>

<script>
let allMessages = [];
let usersMap = {};
let currentTotal = 0;

async function loadChannels() {
  try {
    const res = await fetch('/api/slack-channel');
    const data = await res.json();
    usersMap = data.users || {};
    // 名前順にソートして保持
    allChannels = [...(data.channels || [])].sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    renderChannelList('');
    // チャンネル検索フィルター
    document.getElementById('chSearch').addEventListener('input', (e) => {
      renderChannelList(e.target.value.trim());
    });
  } catch(e) {
    document.getElementById('channelSelect').innerHTML = '<option value="">読み込みエラー</option>';
  }
  renderRecentChannels();
}

async function fetchMessages() {
  const channel = document.getElementById('channelSelect').value;
  const limit = document.getElementById('limitSelect').value;
  if (!channel) return alert('チャンネルを選択してください');

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '取得中...';
  document.getElementById('messagesArea').innerHTML = '<div class="loading">読み込み中...</div>';
  document.getElementById('statsArea').innerHTML = '';
  document.getElementById('aiBox').classList.remove('visible');

  try {
    const res = await fetch('/api/slack-channel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel, limit: parseInt(limit), keyword: document.getElementById('filterInput').value.trim() || null })
    });
    const data = await res.json();
    allMessages = data.messages || [];
    currentTotal = data.total;
    renderMessages(allMessages);
    saveRecentChannel(channel);
    if (allMessages.length > 0) {
      document.getElementById('aiBox').classList.add('visible');
    }
  } catch(e) {
    document.getElementById('messagesArea').innerHTML = '<div class="empty">エラーが発生しました</div>';
  }

  btn.disabled = false;
  btn.textContent = '表示 →';
}

function resolveMentions(text) {
  return text.replace(/~~~LT~~~@([A-Z0-9]+)~~~GT~~~/g, (match, uid) => {
    const name = usersMap[uid];
    return name ? `@${name}` : match;
  });
}

function renderMessages(msgs) {
  const filter = document.getElementById('filterInput').value.trim().toLowerCase();
  const filtered = filter ? msgs.filter(m => m.text.toLowerCase().includes(filter)) : msgs;

  document.getElementById('statsArea').innerHTML = `
    <div class="stats">
      表示: <span>${filtered.length}件</span> / 取得: ${msgs.length}件 / 総数: ${currentTotal}件${filter ? ' （全件から検索）' : ''}
    </div>`;

  if (filtered.length === 0) {
    document.getElementById('messagesArea').innerHTML = '<div class="empty">メッセージが見つかりません</div>';
    return;
  }

  document.getElementById('messagesArea').innerHTML = filtered.map(m => {
    let text = m.text.replace(/&/g,'&amp;').replace(/</g,'~~~LT~~~').replace(/>/g,'~~~GT~~~');
    text = resolveMentions(text);
    text = text.replace(/~~~LT~~~/g,'&lt;').replace(/~~~GT~~~/g,'&gt;');
    if (filter) {
      const re = new RegExp(filter.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      text = text.replace(re, s => `<mark class="highlight">${s}</mark>`);
    }
    const isReply = !!m.thread_ts;
    return `
      <div class="msg${isReply ? ' is-reply' : ''}">
        <div class="msg-header">
          ${isReply ? '<span class="reply-label">↳ 返信</span>' : ''}
          <span class="msg-user">${m.user || "不明"}</span>
          <span class="msg-date">${m.date}</span>
        </div>
        <div class="msg-text">${text}</div>
      </div>`;
  }).join('');
}

function parseMarkdown(raw) {
  let text = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = text.split('\n');
  const result = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^####\s/.test(line)) { result.push(`<h4>${inlineFmt(line.replace(/^####\s+/,''))}</h4>`); i++; continue; }
    if (/^###\s/.test(line))  { result.push(`<h3>${inlineFmt(line.replace(/^###\s+/,''))}</h3>`); i++; continue; }
    if (/^##\s/.test(line))   { result.push(`<h2>${inlineFmt(line.replace(/^##\s+/,''))}</h2>`); i++; continue; }
    if (/^#\s/.test(line))    { result.push(`<h1>${inlineFmt(line.replace(/^#\s+/,''))}</h1>`); i++; continue; }
    if (/^---+$/.test(line.trim())) { result.push('<hr>'); i++; continue; }
    if (/^[-*]\s/.test(line) || /^\d+\.\s/.test(line)) {
      const items = [];
      const isOrdered = /^\d+\.\s/.test(line);
      while (i < lines.length && (/^[-*]\s/.test(lines[i]) || /^\d+\.\s/.test(lines[i]))) {
        items.push(`<li>${inlineFmt(lines[i].replace(/^[-*]\s+/,'').replace(/^\d+\.\s+/,''))}</li>`);
        i++;
      }
      result.push(`<${isOrdered?'ol':'ul'}>${items.join('')}</${isOrdered?'ol':'ul'}>`);
      continue;
    }
    if (line.includes('|') && i+1 < lines.length && lines[i+1].includes('---')) {
      const headers = line.split('|').filter(c=>c.trim()).map(c=>`<th>${inlineFmt(c.trim())}</th>`);
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].includes('|')) {
        const cells = lines[i].split('|').filter(c=>c.trim()).map(c=>`<td>${inlineFmt(c.trim())}</td>`);
        rows.push(`<tr>${cells.join('')}</tr>`);
        i++;
      }
      result.push(`<table><thead><tr>${headers.join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`);
      continue;
    }
    if (line.trim() === '') { result.push('<br>'); i++; continue; }
    result.push(`<p>${inlineFmt(line)}</p>`);
    i++;
  }
  return result.join('\n');
}
function inlineFmt(t) {
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
}

function setPreset(text) {
  document.getElementById('aiPromptInput').value = text;
  document.getElementById('aiPromptInput').focus();
}

let chatLog = []; // {role: 'user'|'ai', text: string}
let lastAiResult = '';

function renderChat() {
  const history = document.getElementById('chatHistory');
  const empty = document.getElementById('chatEmpty');
  if (chatLog.length === 0) {
    empty.style.display = 'block';
    history.innerHTML = '<div class="chat-empty" id="chatEmpty">メッセージを取得してから質問してください</div>';
    return;
  }
  history.innerHTML = chatLog.map(m => `
    <div class="chat-msg ${m.role}">
      <div class="chat-label">${m.role === 'user' ? 'あなた' : 'AI'}</div>
      ${m.role === 'ai' && m.thinking ? `<div class="thinking-box">${m.text === '考え中...' || m.text.startsWith('__STREAMING__') ? '<div class="thinking-label"><span class="thinking-dot"></span>thinking...</div>' : ''}<div>${m.thinking.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(-800)}</div></div>` : ''}
    <div class="chat-bubble">${m.role === 'ai'
      ? (m.text === '考え中...' ? '<span style="color:#555">考え中...</span>'
        : m.text.startsWith('__STREAMING__')
          ? parseMarkdown(m.text.slice(14)) + '<span class="streaming-cursor"></span>'
          : parseMarkdown(m.text))
      : m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`).join('');
  // 最下部にスクロール
  history.scrollTop = history.scrollHeight;
}

function clearChat() {
  chatLog = [];
  lastAiResult = '';
  renderChat();
  document.getElementById('saveArea').style.display = 'none';
}

async function analyze() {
  const prompt = document.getElementById('aiPromptInput').value.trim();
  if (!prompt) return;
  if (allMessages.length === 0) return alert('先にメッセージを取得してください');

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  document.getElementById('aiPromptInput').value = '';
  document.getElementById('aiPresets').style.display = 'none';

  // ユーザーメッセージを追加
  chatLog.push({ role: 'user', text: prompt });
  chatLog.push({ role: 'ai', text: '考え中...' });
  renderChat();

  // コンテキスト：Slackメッセージ + 過去のチャット履歴
  const slackContext = allMessages
    .map(m => `[${m.date}] ${m.user||"不明"}: ${m.text}`)
    .join('\n');
  const chatContext = chatLog.slice(0, -1)
    .map(m => `${m.role === 'user' ? 'ユーザー' : 'AI'}: ${m.text}`)
    .join('\n');
  const context = slackContext + (chatContext ? '\n\n--- 会話履歴 ---\n' + chatContext : '');

  const channel = document.getElementById('channelSelect').value;

  try {
    const res = await fetch('/api/slack-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, context, channel })
    });

    // SSEストリーミング読み込み
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let thinkingText = '';
    let answerText = '';
    let phase = 'thinking'; // 'thinking' | 'answer'

    chatLog[chatLog.length - 1].text = '__STREAMING__';
    chatLog[chatLog.length - 1].thinking = '';
    renderChat();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (evt.type === 'thinking_start') {
            phase = 'thinking';
          } else if (evt.type === 'text_start') {
            phase = 'answer';
          } else if (evt.type === 'thinking') {
            thinkingText += evt.text;
            chatLog[chatLog.length - 1].thinking = thinkingText;
            renderChat();
          } else if (evt.type === 'text') {
            answerText += evt.text;
            chatLog[chatLog.length - 1].text = '__STREAMING__' + answerText;
            renderChat();
          } else if (evt.type === 'done') {
            chatLog[chatLog.length - 1].text = answerText || '回答を生成できませんでした';
            chatLog[chatLog.length - 1].thinking = thinkingText;
            lastAiResult = answerText;
            renderChat();
          } else if (evt.type === 'error') {
            chatLog[chatLog.length - 1].text = 'エラー: ' + evt.message;
            renderChat();
          }
        } catch {}
      }
    }
    document.getElementById('saveArea').style.display = 'block';
  } catch(e) {
    chatLog[chatLog.length - 1].text = 'エラー: ' + e.message;
    renderChat();
  }

  btn.disabled = false;
  btn.textContent = '送信 →';
  document.getElementById('aiPromptInput').focus();
}

// 最近使ったチャンネルの管理
function saveRecentChannel(ch) {
  let recent = JSON.parse(localStorage.getItem('wv_recent_channels') || '[]');
  recent = [ch, ...recent.filter(c => c !== ch)].slice(0, 4);
  localStorage.setItem('wv_recent_channels', JSON.stringify(recent));
  renderRecentChannels();
}

function renderChannelList(query) {
  const select = document.getElementById('channelSelect');
  const filtered = query
    ? allChannels.filter(ch => ch.name.includes(query))
    : allChannels;
  select.innerHTML = '<option value="">チャンネルを選択...</option>' +
    filtered.map(ch => `<option value="${ch.name}">#${ch.name} (${ch.count}件)</option>`).join('');
}

function renderRecentChannels() {
  const recent = JSON.parse(localStorage.getItem('wv_recent_channels') || '[]');
  const area = document.getElementById('recentArea');
  if (recent.length === 0) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  area.innerHTML = '<div class="recent-channels">' +
    recent.map(ch => `<button class="recent-ch-btn" onclick="selectChannel('${ch.replace(/'/g, "\'")}')">＃${ch}</button>`).join('') +
    '</div>';
}

function selectChannel(ch) {
  const select = document.getElementById('channelSelect');
  select.value = ch;
  fetchMessages();
}

// IME対応Enter送信
let isComposing = false;
const aiInput = document.getElementById('aiPromptInput');
aiInput.addEventListener('compositionstart', () => { isComposing = true; });
aiInput.addEventListener('compositionend', () => { isComposing = false; });
aiInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !isComposing) analyze(); });

document.getElementById('filterInput').addEventListener('input', () => {
  if (allMessages.length > 0) renderMessages(allMessages);
});

document.getElementById('channelSelect').addEventListener('change', fetchMessages);

async function saveResult() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  const channel = document.getElementById('channelSelect').value;
  const prompt = chatLog.filter(m=>m.role==='user').map(m=>m.text).join(' / ').slice(0, 100);
  const result = lastAiResult;
  try {
    const res = await fetch('/api/save-analysis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel, prompt, result })
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = '✅ 保存しました！';
      document.getElementById('listLink').href = `analysis_detail.html?id=${data.id}`;
      document.getElementById('listLink').textContent = '結果を見る →';
    } else {
      btn.textContent = 'エラー';
    }
  } catch(e) {
    btn.textContent = 'エラー';
  }
}

loadChannels();
