<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WriteVideo.ai Slackチャンネル閲覧</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f2ec; color: #0f0e0d; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 80px 20px 40px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 32px; font-family: monospace; }

.controls { background: white; border: 1px solid #e5e0d8; padding: 20px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.control-group { display: flex; flex-direction: column; gap: 6px; }
.control-label { font-size: 11px; font-family: monospace; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
.control-select { padding: 10px 12px; border: 1px solid #e5e0d8; font-size: 14px; outline: none; background: white; min-width: 220px; }
.control-select:focus { border-color: #c8460a; }
.search-input { padding: 10px 12px; border: 1px solid #e5e0d8; font-size: 14px; outline: none; width: 200px; }
.search-input:focus { border-color: #c8460a; }
.fetch-btn { padding: 10px 24px; background: #0f0e0d; color: white; border: none; font-size: 13px; cursor: pointer; font-family: monospace; letter-spacing: 0.05em; height: 42px; }
.fetch-btn:hover { background: #c8460a; }
.fetch-btn:disabled { background: #ccc; cursor: not-allowed; }

/* AI分析エリア */
.ai-box { background: white; border: 1px solid #e5e0d8; padding: 20px; margin-bottom: 20px; display: none; }
.ai-box.visible { display: block; }
.ai-box-title { font-size: 11px; font-family: monospace; color: #c8460a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.ai-prompt-row { display: flex; gap: 10px; }
.ai-prompt-input { flex: 1; padding: 10px 12px; border: 1px solid #e5e0d8; font-size: 14px; outline: none; font-family: inherit; }
.ai-prompt-input:focus { border-color: #c8460a; }
.ai-analyze-btn { padding: 10px 20px; background: #c8460a; color: white; border: none; font-size: 13px; cursor: pointer; font-family: monospace; white-space: nowrap; }
.ai-analyze-btn:hover { background: #a33808; }
.ai-analyze-btn:disabled { background: #ccc; cursor: not-allowed; }
.ai-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.ai-preset { font-size: 11px; font-family: monospace; padding: 4px 10px; border: 1px solid #e5e0d8; background: #faf8f5; cursor: pointer; color: #666; }
.ai-preset:hover { border-color: #c8460a; color: #c8460a; }
.ai-result { margin-top: 16px; padding: 16px; background: #faf8f5; border-left: 3px solid #c8460a; font-size: 14px; line-height: 1.8; white-space: pre-wrap; display: none; }
.ai-result.visible { display: block; }

.stats { font-size: 12px; font-family: monospace; color: #888; margin-bottom: 12px; }
.stats span { color: #c8460a; font-weight: 700; }

.msg { background: white; border: 1px solid #e5e0d8; padding: 16px; margin-bottom: 8px; }
.msg-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.msg-user { font-size: 12px; font-family: monospace; color: #c8460a; font-weight: 700; }
.msg-date { font-size: 11px; color: #aaa; font-family: monospace; }
.msg-text { font-size: 14px; line-height: 1.7; color: #0f0e0d; white-space: pre-wrap; word-break: break-word; }
.empty { text-align: center; padding: 48px; color: #aaa; font-size: 13px; font-family: monospace; }
.loading { text-align: center; padding: 48px; color: #888; font-size: 13px; font-family: monospace; }
.highlight { background: #fff3cd; }

/* マークダウンスタイル */
#aiResult h1 { font-size: 18px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #e5e0d8; }
#aiResult h2 { font-size: 16px; font-weight: 700; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #e5e0d8; }
#aiResult h3 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: #c8460a; }
#aiResult h4 { font-size: 13px; font-weight: 700; margin: 10px 0 4px; }
#aiResult p { margin-bottom: 10px; }
#aiResult ul, #aiResult ol { margin: 6px 0 10px 20px; }
#aiResult li { margin-bottom: 4px; }
#aiResult strong { font-weight: 700; }
#aiResult em { font-style: italic; }
#aiResult code { font-family: monospace; background: #f0ebe3; padding: 2px 5px; font-size: 12px; }
#aiResult hr { border: none; border-top: 1px solid #e5e0d8; margin: 16px 0; }
#aiResult table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
#aiResult th { background: #f5f2ec; padding: 6px 10px; text-align: left; border: 1px solid #e5e0d8; font-weight: 700; }
#aiResult td { padding: 6px 10px; border: 1px solid #e5e0d8; }
#aiResult tr:nth-child(even) td { background: #faf8f5; }
</style>
</head>
<body>
<div style="font-size:10px;font-family:monospace;color:#bbb;margin-bottom:12px;">Released: 2026-04-16 12:31 JST</div>
<div style="position:fixed;top:20px;left:20px;z-index:9999;">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;background:#0f0e0d;color:#f5f2ec;text-decoration:none;padding:8px 14px;font-family:monospace;font-size:12px;letter-spacing:0.05em;">← ダッシュボードに戻る</a>
</div>
<script>fetch("/api/check-session").then(r=>r.json()).then(d=>{if(!d.auth){window.location.href="/index.html";}}).catch(()=>{window.location.href="/index.html";});</script>

<div class="container">
  <h1>Slackチャンネル閲覧・分析</h1>
  <p class="sub">チャンネルを選択してメッセージを表示・AIで分析</p>

  <div class="controls">
    <div class="control-group">
      <span class="control-label">チャンネル</span>
      <select class="control-select" id="channelSelect">
        <option value="">読み込み中...</option>
      </select>
    </div>
    <div class="control-group">
      <span class="control-label">取得件数</span>
      <select class="control-select" id="limitSelect" style="min-width:120px;">
        <option value="30">30件</option>
        <option value="50" selected>50件</option>
        <option value="100">100件</option>
        <option value="200">200件</option>
        <option value="500">500件</option>
      </select>
    </div>
    <div class="control-group">
      <span class="control-label">テキスト絞り込み</span>
      <input type="text" class="search-input" id="filterInput" placeholder="キーワードで絞り込み">
    </div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchMessages()">表示 →</button>
  </div>

  <!-- AI分析エリア -->
  <div class="ai-box" id="aiBox">
    <div class="ai-box-title">🤖 AIで分析</div>
    <div class="ai-prompt-row">
      <input type="text" class="ai-prompt-input" id="aiPromptInput" placeholder="例：このチャンネルから営業マニュアルを作って" onkeydown="if(event.key==='Enter')analyze()">
      <button class="ai-analyze-btn" id="analyzeBtn" onclick="analyze()">分析 →</button>
    </div>
    <div class="ai-presets">
      <span class="ai-preset" onclick="setPreset('このチャンネルの会話から営業マニュアルを作成して')">営業マニュアル作成</span>
      <span class="ai-preset" onclick="setPreset('よく出てくる課題・問題点を整理して')">課題整理</span>
      <span class="ai-preset" onclick="setPreset('FAQを抽出して質問と回答の形式でまとめて')">FAQ抽出</span>
      <span class="ai-preset" onclick="setPreset('重要な意思決定や結論をまとめて')">意思決定まとめ</span>
      <span class="ai-preset" onclick="setPreset('このチャンネルの会話を要約して')">要約</span>
      <span class="ai-preset" onclick="setPreset('改善提案・アクションアイテムを抽出して')">アクション抽出</span>
    </div>
    <div class="ai-result" id="aiResult"></div>
    <div id="saveArea" style="display:none;margin-top:12px;">
      <button class="fetch-btn" onclick="saveResult()" id="saveBtn" style="background:#1D9E75;">💾 保存して一覧に追加</button>
      <a id="listLink" href="analysis_list.html" style="font-size:12px;font-family:monospace;color:#888;margin-left:16px;text-decoration:underline;">一覧を見る →</a>
    </div>
  </div>

  <div id="statsArea"></div>
  <div id="messagesArea"><div class="empty">チャンネルを選択して「表示」を押してください</div></div>
</div>

<script>
let allMessages = [];
let currentTotal = 0;

async function loadChannels() {
  try {
    const res = await fetch('/api/slack-channel');
    const data = await res.json();
    const select = document.getElementById('channelSelect');
    select.innerHTML = '<option value="">チャンネルを選択...</option>';
    for (const ch of data.channels) {
      const opt = document.createElement('option');
      opt.value = ch.name;
      opt.textContent = `#${ch.name} (${ch.count}件)`;
      select.appendChild(opt);
    }
  } catch(e) {
    document.getElementById('channelSelect').innerHTML = '<option value="">読み込みエラー</option>';
  }
}

async function fetchMessages() {
  const channel = document.getElementById('channelSelect').value;
  const limit = document.getElementById('limitSelect').value;
  if (!channel) return alert('チャンネルを選択してください');

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '取得中...';
  document.getElementById('messagesArea').innerHTML = '<div class="loading">読み込み中...</div>';
  document.getElementById('statsArea').innerHTML = '';
  document.getElementById('aiBox').classList.remove('visible');
  document.getElementById('aiResult').classList.remove('visible');

  try {
    const res = await fetch('/api/slack-channel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel, limit: parseInt(limit) })
    });
    const data = await res.json();
    allMessages = data.messages || [];
    currentTotal = data.total;
    renderMessages(allMessages);
    if (allMessages.length > 0) {
      document.getElementById('aiBox').classList.add('visible');
    }
  } catch(e) {
    document.getElementById('messagesArea').innerHTML = '<div class="empty">エラーが発生しました</div>';
  }

  btn.disabled = false;
  btn.textContent = '表示 →';
}

function renderMessages(msgs) {
  const filter = document.getElementById('filterInput').value.trim().toLowerCase();
  const filtered = filter ? msgs.filter(m => m.text.toLowerCase().includes(filter)) : msgs;

  document.getElementById('statsArea').innerHTML = `
    <div class="stats">
      表示: <span>${filtered.length}件</span> / 取得: ${msgs.length}件 / 総数: ${currentTotal}件
    </div>`;

  if (filtered.length === 0) {
    document.getElementById('messagesArea').innerHTML = '<div class="empty">メッセージが見つかりません</div>';
    return;
  }

  document.getElementById('messagesArea').innerHTML = filtered.map(m => {
    let text = m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (filter) {
      const re = new RegExp(filter.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      text = text.replace(re, s => `<mark class="highlight">${s}</mark>`);
    }
    return `
      <div class="msg">
        <div class="msg-header">
          <span class="msg-user">${m.user}</span>
          <span class="msg-date">${m.date}</span>
        </div>
        <div class="msg-text">${text}</div>
      </div>`;
  }).join('');
}

function parseMarkdown(raw) {
  let text = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = text.split('\n');
  const result = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^####\s/.test(line)) { result.push(`<h4>${inlineFmt(line.replace(/^####\s+/,''))}</h4>`); i++; continue; }
    if (/^###\s/.test(line))  { result.push(`<h3>${inlineFmt(line.replace(/^###\s+/,''))}</h3>`); i++; continue; }
    if (/^##\s/.test(line))   { result.push(`<h2>${inlineFmt(line.replace(/^##\s+/,''))}</h2>`); i++; continue; }
    if (/^#\s/.test(line))    { result.push(`<h1>${inlineFmt(line.replace(/^#\s+/,''))}</h1>`); i++; continue; }
    if (/^---+$/.test(line.trim())) { result.push('<hr>'); i++; continue; }
    if (/^[-*]\s/.test(line) || /^\d+\.\s/.test(line)) {
      const items = [];
      const isOrdered = /^\d+\.\s/.test(line);
      while (i < lines.length && (/^[-*]\s/.test(lines[i]) || /^\d+\.\s/.test(lines[i]))) {
        items.push(`<li>${inlineFmt(lines[i].replace(/^[-*]\s+/,'').replace(/^\d+\.\s+/,''))}</li>`);
        i++;
      }
      result.push(`<${isOrdered?'ol':'ul'}>${items.join('')}</${isOrdered?'ol':'ul'}>`);
      continue;
    }
    if (line.includes('|') && i+1 < lines.length && lines[i+1].includes('---')) {
      const headers = line.split('|').filter(c=>c.trim()).map(c=>`<th>${inlineFmt(c.trim())}</th>`);
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].includes('|')) {
        const cells = lines[i].split('|').filter(c=>c.trim()).map(c=>`<td>${inlineFmt(c.trim())}</td>`);
        rows.push(`<tr>${cells.join('')}</tr>`);
        i++;
      }
      result.push(`<table><thead><tr>${headers.join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`);
      continue;
    }
    if (line.trim() === '') { result.push('<br>'); i++; continue; }
    result.push(`<p>${inlineFmt(line)}</p>`);
    i++;
  }
  return result.join('\n');
}
function inlineFmt(t) {
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
}

function setPreset(text) {
  document.getElementById('aiPromptInput').value = text;
  document.getElementById('aiPromptInput').focus();
}

async function analyze() {
  const prompt = document.getElementById('aiPromptInput').value.trim();
  if (!prompt) return alert('分析内容を入力してください');
  if (allMessages.length === 0) return alert('先にメッセージを取得してください');

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '分析中...';

  const resultEl = document.getElementById('aiResult');
  resultEl.classList.add('visible');
  resultEl.textContent = '分析中...';

  // メッセージをコンテキスト化
  const context = allMessages
    .map(m => `[${m.date}] ${m.user}: ${m.text}`)
    .join('\n');

  const channel = document.getElementById('channelSelect').value;

  try {
    const res = await fetch('/api/slack-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, context, channel })
    });
    const data = await res.json();
    resultEl.innerHTML = parseMarkdown(data.result || 'エラーが発生しました');
    document.getElementById('saveArea').style.display = 'block';
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveBtn').textContent = '💾 保存して一覧に追加';
    document.getElementById('listLink').href = 'analysis_list.html';
    document.getElementById('listLink').textContent = '一覧を見る →';
  } catch(e) {
    resultEl.textContent = 'エラー: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '分析 →';
}

document.getElementById('filterInput').addEventListener('input', () => {
  if (allMessages.length > 0) renderMessages(allMessages);
});

document.getElementById('channelSelect').addEventListener('change', fetchMessages);

async function saveResult() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  const channel = document.getElementById('channelSelect').value;
  const prompt = document.getElementById('aiPromptInput').value;
  const result = document.getElementById('aiResult').textContent;
  try {
    const res = await fetch('/api/save-analysis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel, prompt, result })
    });
    const data = await res.json();
    if (data.success) {
      btn.textContent = '✅ 保存しました！';
      document.getElementById('listLink').href = `analysis_detail.html?id=${data.id}`;
      document.getElementById('listLink').textContent = '結果を見る →';
    } else {
      btn.textContent = 'エラー';
    }
  } catch(e) {
    btn.textContent = 'エラー';
  }
}

loadChannels();
</script>
</body>
</html>
